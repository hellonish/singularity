# Test compose — simulates t3.micro memory limits locally
# Usage: docker compose -f docker-compose.test.yml up -d && docker stats --no-stream

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: singularity
      POSTGRES_USER: singularity
      POSTGRES_PASSWORD: loremipsum
    ports:
      - "5432:5432"
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=2MB
      -c max_connections=50
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    image: hellonish/singularity-api:latest
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://singularity:loremipsum@postgres:5432/singularity
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    image: hellonish/singularity-api:latest
    depends_on:
      - postgres
      - redis
      - qdrant
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://singularity:loremipsum@postgres:5432/singularity
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - ENVIRONMENT=production
    command: python -m workers.main
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    image: hellonish/singularity-frontend:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
